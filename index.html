<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QIVIP Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid #333; }</style>
</head>
<body class="bg-black text-white p-6 font-sans">
    <div class="max-w-md mx-auto">
        <div class="glass-card p-6 rounded-3xl border-l-4 border-amber-500 mb-6">
            <h1 class="text-3xl font-black text-amber-500 tracking-widest">QIVIP</h1>
            <p class="text-cyan-400 text-sm">Alchemical Therapeutics Matrix</p>
        </div>
        <input type="text" id="nameInput" placeholder="الاسم الكامل" class="w-full bg-zinc-900 p-4 rounded-xl border border-zinc-700 mb-4">
        <button onclick="runMatrix()" class="w-full bg-amber-600 p-4 rounded-xl font-bold text-black mb-6">تحليل المصفوفة</button>
        <div id="results" class="hidden glass-card p-6 rounded-3xl text-center">
            <h2 id="resultText" class="text-xl font-bold text-emerald-400"></h2>
        </div>
    </div>
    <script>
        function runMatrix() {
            const name = document.getElementById('nameInput').value;
            if(!name) return;
            const res = document.getElementById('results');
            res.classList.remove('hidden');
            document.getElementById('resultText').innerText = "تمت معالجة بيانات " + name + " بنجاح في المصفوفة.";
        }
    </script>
</body>
</html>
